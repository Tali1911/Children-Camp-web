[build]
  command = "npm run build"
  publish = "dist"

# Enable Netlify's built-in prerendering for search engine bots
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[build.environment]
  NODE_VERSION = "20"
  
# Bot prerendering - serves pre-rendered HTML to crawlers
[[plugins]]
  package = "@netlify/plugin-sitemap"

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
